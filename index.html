    <!--
      Blog article link patcher.
      Maps article card heading keywords to their root-level .html pages.
      Runs on a MutationObserver so it fires AFTER React renders the blog section.
    -->
    <script>
      (function() {
        // keyword -> url mapping (all files are at the root)
        var routes = [
          { words: ['ai search visibility', 'what is ai search'], url: '/ai-search-visibility.html' },
          { words: ['chatgpt', 'competitors', 'recommending your competitors'], url: '/chatgpt-recommends-competitors.html' },
          { words: ['ai guilt', '5 signs'], url: '/ai-guilt.html' },
          { words: ['google ai overviews', 'ai overviews'], url: '/google-ai-overviews.html' }
        ];

        function findRoute(text) {
          var lower = text.toLowerCase();
          for (var i = 0; i < routes.length; i++) {
            for (var j = 0; j < routes[i].words.length; j++) {
              if (lower.indexOf(routes[i].words[j]) !== -1) return routes[i].url;
            }
          }
          return null;
        }

        function patchLinks() {
          // Find all anchor tags whose text is Read More or Read Article
          var links = document.querySelectorAll('a');
          links.forEach(function(a) {
            var txt = (a.textContent || '').trim().toLowerCase();
            if (txt !== 'read more' && txt !== 'read more \u2192' && txt !== 'read article' && txt !== 'read article \u2192') return;
            if (a.dataset.patched) return;

            // Find the nearest heading in the same card
            var card = a.closest('[class]') || a.parentElement;
            var heading = '';
            if (card) {
              // Walk up to find a bigger container with a heading
              var container = card;
              for (var i = 0; i < 6; i++) {
                var h = container.querySelector('h1,h2,h3,h4,h5,h6,p');
                if (h && h.textContent.length > 10) { heading = h.textContent; break; }
                if (container.parentElement) container = container.parentElement;
              }
            }

            var url = findRoute(heading);
            if (url) {
              a.setAttribute('href', url);
              a.dataset.patched = '1';
            }
          });
        }

        // Run immediately and on every DOM change
        var done = false;
        var obs = new MutationObserver(function() {
          patchLinks();
        });
        obs.observe(document.body, { childList: true, subtree: true });

        // Also run a few times after load to be safe
        window.addEventListener('load', function() {
          patchLinks();
          setTimeout(patchLinks, 500);
          setTimeout(patchLinks, 1500);
          setTimeout(function() { obs.disconnect(); }, 8000);
        });
      })();
    </script>
