      /* Success/Error message styles */

      .sn-message-btn:hover { opacity: 0.9; }
      .sn-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: snSpin 1s linear infinite;
      }
      @keyframes snFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes snSpin {
        to { transform: rotate(360deg); }
      }

    <script type="application/ld+json">
    { "@context": "https://schema.org", "@type": "Organization", "name": "Silverene North Corp", "url": "https://silverenebusinessgroup.com", "logo": "https://silverenebusinessgroup.com/logo.png" }

    <div id="root"></div>

    <script>
    // ============================================================
    // SILVERENE NORTH - CUSTOM SCRIPTS v6
    // ============================================================

    (function() {
      
      // ============================================================
      // FORMSPREE ENDPOINT - Sends emails to info@silverenebusinessgroup.com
      // ============================================================
      var FORMSPREE_URL = 'https://formspree.io/f/xwpopwkq';
      
      // ============================================================
      // 1. HIDE SECTIONS VIA DOM MANIPULATION
      // ============================================================
      function hideElements() {
        // Hide "Meet the Founder" section
        document.querySelectorAll('h2, h3').forEach(function(el) {
          var text = (el.textContent || '').toLowerCase();
          if (text.indexOf('meet the founder') !== -1 || text.indexOf('the team') !== -1) {
            var parent = el.parentElement;
            for (var i = 0; i < 8; i++) {
              if (!parent) break;
              var tag = parent.tagName.toLowerCase();
              if (tag === 'section' || (parent.className && parent.className.indexOf('py-') !== -1)) {
                parent.style.display = 'none';
                break;
              }
              parent = parent.parentElement;
            }
          }
        });

        // Hide "Toronto Office" and "Dubai Inquiries" cards
        document.querySelectorAll('h3, h4').forEach(function(el) {
          var text = (el.textContent || '').toLowerCase();
          if (text.indexOf('toronto office') !== -1 || text.indexOf('dubai inquiries') !== -1) {
            var parent = el.parentElement;
            for (var i = 0; i < 6; i++) {
              if (!parent) break;
              if (parent.className && (parent.className.indexOf('rounded') !== -1 || parent.className.indexOf('border') !== -1 || parent.className.indexOf('shadow') !== -1)) {
                parent.style.display = 'none';
                break;
              }
              parent = parent.parentElement;
            }
          }
        });

        // Hide the grid containing both office cards
        document.querySelectorAll('div').forEach(function(el) {
          var children = el.querySelectorAll('h3, h4');
          var hasTorontoOffice = false;
          var hasDubaiInquiries = false;
          children.forEach(function(child) {
            var t = (child.textContent || '').toLowerCase();
            if (t.indexOf('toronto office') !== -1) hasTorontoOffice = true;
            if (t.indexOf('dubai inquiries') !== -1) hasDubaiInquiries = true;
          });
          if (hasTorontoOffice && hasDubaiInquiries) {
            el.style.display = 'none';
          }
        });

        // Hide "Book a Call" section
        document.querySelectorAll('h3, h4').forEach(function(el) {
          var text = (el.textContent || '').toLowerCase();
          if (text.indexOf('book a call') !== -1) {
            var parent = el.parentElement;
            for (var i = 0; i < 6; i++) {
              if (!parent) break;
              if (parent.className && (parent.className.indexOf('rounded') !== -1 || parent.className.indexOf('border') !== -1 || parent.className.indexOf('bg-') !== -1)) {
                parent.style.display = 'none';
                break;
              }
              parent = parent.parentElement;
            }
          }
        });
      }

      // Run after DOM is ready and after React renders
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(hideElements, 500);
          setTimeout(hideElements, 1500);
          setTimeout(hideElements, 3000);
        });
      } else {
        setTimeout(hideElements, 500);
        setTimeout(hideElements, 1500);
        setTimeout(hideElements, 3000);
      }

      // Also run on any DOM changes
      var hideObserver = new MutationObserver(function() {
        setTimeout(hideElements, 100);
      });
      setTimeout(function() {
        hideObserver.observe(document.body, { childList: true, subtree: true });
      }, 2000);

      // ============================================================
      // 2. CONTACT & FREE AI AUDIT NAVIGATION - SCROLL TO FORM
      // ============================================================
      function scrollToForm() {
        var form = document.querySelector('form');
        if (form) {
          var rect = form.getBoundingClientRect();
          var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          var targetY = rect.top + scrollTop - 50;
          
          window.scrollTo({
            top: targetY,
            behavior: 'smooth'
          });
          return true;
        }
        return false;
      }

      // Check if element or its text indicates a contact/audit link
      function isContactOrAuditLink(element) {
        var text = (element.textContent || '').toLowerCase().trim();
        var href = (element.getAttribute('href') || '').toLowerCase();
        
        // Check text content
        if (text === 'contact') return true;
        if (text.indexOf('free ai audit') !== -1) return true;
        if (text.indexOf('get your free') !== -1) return true;
        if (text.indexOf('book a free') !== -1) return true;
        if (text.indexOf('request audit') !== -1) return true;
        
        // Check href
        if (href === '#contact') return true;
        if (href === '/#contact') return true;
        if (href === '/contact') return true;
        if (href.indexOf('#contact') !== -1) return true;
        
        return false;
      }

      // Main click interceptor for Contact/Audit links - CAPTURE PHASE
      document.addEventListener('click', function(e) {
        var target = e.target;
        var clickable = null;
        var node = target;
        
        // Walk up to find the clickable element
        for (var i = 0; i < 8; i++) {
          if (!node || node === document.body) break;
          if (node.tagName === 'A' || node.tagName === 'BUTTON') {
            clickable = node;
            break;
          }
          node = node.parentElement;
        }
        
        if (!clickable) return;
        
        // Check if this is a contact or audit link
        if (isContactOrAuditLink(clickable)) {
          // BLOCK React Router completely
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          
          // If not on home page, navigate there
          var path = window.location.pathname;
          if (path !== '/' && path !== '/index.html' && path !== '') {
            window.location.href = '/#contact';
            return false;
          }
          
          // Scroll to form immediately and with delays (for React render)
          scrollToForm();
          setTimeout(scrollToForm, 100);
          setTimeout(scrollToForm, 300);
          setTimeout(scrollToForm, 600);
          
          return false;
        }
      }, true); // CAPTURE PHASE - fires before React

      // ============================================================
      // 3. CONTACT FORM - SILENT SUBMISSION VIA FORMSPREE
      // ============================================================
      
      function showMessage(type, title, text) {
        var existing = document.querySelector('.sn-message-overlay');
        if (existing) existing.remove();
        
        var iconContent = type === 'loading' ? '<div class="sn-spinner"></div>' : (type === 'success' ? '✓' : '✕');
        var showButton = type !== 'loading';
        
        var overlay = document.createElement('div');
        overlay.className = 'sn-message-overlay';
        overlay.innerHTML = 
          '<div class="sn-message-box">' +
            '<div class="sn-message-icon ' + type + '">' + iconContent + '</div>' +
            '<div class="sn-message-title">' + title + '</div>' +
            '<div class="sn-message-text">' + text + '</div>' +
            (showButton ? '<button class="sn-message-btn" onclick="this.closest(\'.sn-message-overlay\').remove()">Got It</button>' : '') +
          '</div>';
        document.body.appendChild(overlay);
        
        if (type === 'success') {
          setTimeout(function() {
            if (overlay.parentNode) overlay.remove();
          }, 6000);
        }
        
        return overlay;
      }
      
      function handleFormSubmit(e) {
        e.preventDefault();
        e.stopPropagation();
        
        var form = e.target;
        var btn = form.querySelector('button[type="submit"], button');
        var originalBtnText = btn ? btn.textContent : '';
        
        var inputs = form.querySelectorAll('input, textarea, select');
        var formData = {};
        var hasData = false;
        
        inputs.forEach(function(input) {
          var value = (input.value || '').trim();
          if (!value) return;
          
          hasData = true;
          var fieldName = input.name || input.placeholder || 'field';
          fieldName = fieldName.replace(/[_-]/g, ' ').replace(/([A-Z])/g, ' $1').trim();
          
          if (fieldName.toLowerCase().indexOf('name') !== -1 && fieldName.toLowerCase().indexOf('business') === -1) {
            formData['Name'] = value;
          } else if (fieldName.toLowerCase().indexOf('email') !== -1) {
            formData['Email'] = value;
          } else if (fieldName.toLowerCase().indexOf('phone') !== -1) {
            formData['Phone'] = value;
          } else if (fieldName.toLowerCase().indexOf('business') !== -1 || fieldName.toLowerCase().indexOf('company') !== -1) {
            formData['Business Name'] = value;
          } else if (fieldName.toLowerCase().indexOf('city') !== -1 || fieldName.toLowerCase().indexOf('location') !== -1) {
            formData['Location'] = value;
          } else if (fieldName.toLowerCase().indexOf('message') !== -1 || input.tagName === 'TEXTAREA') {
            formData['Message'] = value;
          } else {
            formData[fieldName] = value;
          }
        });
        
        if (!hasData) {
          alert('Please fill out the form before submitting.');
          return;
        }
        
        formData['_subject'] = 'New AI Audit Request - Silverene North Corp';
        formData['Submitted From'] = window.location.href;
        formData['Submitted At'] = new Date().toLocaleString();
        
        if (btn) {
          btn.textContent = 'Sending...';
          btn.disabled = true;
        }
        showMessage('loading', 'Sending Your Request...', 'Please wait while we submit your audit request.');
        
        fetch(FORMSPREE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(formData)
        })
        .then(function(response) {
          if (response.ok) {
            return response.json();
          }
          throw new Error('Network response was not ok');
        })
        .then(function(data) {
          showMessage(
            'success',
            'Request Submitted!',
            'Thank you! We\'ve received your AI Audit request and will be in touch within 1 business day.<br><br>Check your email for a confirmation.'
          );
          
          inputs.forEach(function(input) {
            if (input.tagName === 'SELECT') {
              input.selectedIndex = 0;
            } else {
              input.value = '';
            }
          });
          
          if (btn) {
            btn.textContent = '✓ Sent!';
            btn.style.backgroundColor = '#22c55e';
            setTimeout(function() {
              btn.textContent = originalBtnText;
              btn.style.backgroundColor = '';
              btn.disabled = false;
            }, 3000);
          }
        })
        .catch(function(error) {
          console.error('Form submission error:', error);
          showMessage(
            'error',
            'Submission Failed',
            'Sorry, there was a problem submitting your request. Please try again or email us directly at <strong>info@silverenebusinessgroup.com</strong>'
          );
          
          if (btn) {
            btn.textContent = originalBtnText;
            btn.disabled = false;
          }
        });
      }
      
      // Intercept form submissions
      document.addEventListener('submit', function(e) {
        var form = e.target;
        if (form.tagName !== 'FORM') return;
        
        var formText = (form.textContent || '').toLowerCase();
        var hasAuditButton = formText.indexOf('free audit') !== -1 || formText.indexOf('get my') !== -1;
        var hasNameField = form.querySelector('input[placeholder*="name" i], input[name*="name" i]');
        var hasEmailField = form.querySelector('input[type="email"], input[placeholder*="email" i]');
        
        if (hasAuditButton || (hasNameField && hasEmailField)) {
          handleFormSubmit(e);
        }
      }, true);

      // Also intercept button clicks
      document.addEventListener('click', function(e) {
        var target = e.target;
        var btn = null;
        var node = target;
        
        for (var i = 0; i < 4; i++) {
          if (!node) break;
          if (node.tagName === 'BUTTON') {
            btn = node;
            break;
          }
          node = node.parentElement;
        }
        if (!btn) return;
        
        var btnText = (btn.textContent || '').toLowerCase();
        
        if (btnText.indexOf('get my free audit') !== -1) {
          var form = btn.closest('form');
          if (form) {
            e.preventDefault();
            e.stopPropagation();
            handleFormSubmit({ target: form, preventDefault: function(){}, stopPropagation: function(){} });
          }
        }
      }, true);

      // ============================================================
      // 4. NAVIGATION INTERCEPTOR FOR BLOG & SERVICES
      // ============================================================
      var blogRoutes = [
        { words: ['ai search visibility', 'what is ai search', 'why your business needs'], url: '/ai-search-visibility.html' },
        { words: ['chatgpt', 'competitors', 'recommending your'], url: '/chatgpt-recommends-competitors.html' },
        { words: ['ai guilt', '5 signs', 'five signs'], url: '/ai-guilt.html' },
        { words: ['google ai overviews', 'ai overviews', 'business owners need to know'], url: '/google-ai-overviews.html' }
      ];

      var serviceRoutes = [
        { words: ['get recommended by ai', 'ai search visibility', 'aeo'], url: '/services/ai-search-visibility.html' },
        { words: ['websites built for humans', 'website development', 'websites built'], url: '/services/website-development.html' },
        { words: ['business automation', 'automate your operations', 'stop doing repetitive'], url: '/services/business-automation.html' },
        { words: ['crm', 'customer relationship', 'know your customers'], url: '/services/crm-implementation.html' },
        { words: ['data analytics', 'data-driven', 'turn data into'], url: '/services/data-analytics.html' }
      ];

      function matchRoute(text, routes) {
        if (!text) return null;
        var t = text.toLowerCase();
        for (var i = 0; i < routes.length; i++) {
          for (var j = 0; j < routes[i].words.length; j++) {
            if (t.indexOf(routes[i].words[j]) !== -1) return routes[i].url;
          }
        }
        return null;
      }

      function getCardText(el) {
        var node = el;
        var allText = '';
        
        for (var depth = 0; depth < 15; depth++) {
          if (!node || node === document.body) break;
          
          var headings = node.querySelectorAll('h1, h2, h3, h4, h5, h6');
          for (var k = 0; k < headings.length; k++) {
            var txt = (headings[k].textContent || '').trim();
            if (txt.length > 8) {
              var blogUrl = matchRoute(txt, blogRoutes);
              var serviceUrl = matchRoute(txt, serviceRoutes);
              if (blogUrl || serviceUrl) return txt;
            }
          }
          
          var titleElements = node.querySelectorAll('[class*="title"], [class*="heading"], [class*="headline"]');
          for (var m = 0; m < titleElements.length; m++) {
            var txt2 = (titleElements[m].textContent || '').trim();
            if (txt2.length > 8 && txt2.length < 200) {
              var blogUrl2 = matchRoute(txt2, blogRoutes);
              var serviceUrl2 = matchRoute(txt2, serviceRoutes);
              if (blogUrl2 || serviceUrl2) return txt2;
            }
          }
          
          var textElements = node.querySelectorAll('p, span, div');
          for (var n = 0; n < textElements.length; n++) {
            var el2 = textElements[n];
            var fullText = (el2.textContent || '').trim();
            if (fullText.length > 8 && fullText.length < 200) {
              var blogUrl3 = matchRoute(fullText, blogRoutes);
              var serviceUrl3 = matchRoute(fullText, serviceRoutes);
              if (blogUrl3 || serviceUrl3) return fullText;
            }
          }
          
          allText += ' ' + (node.textContent || '');
          node = node.parentElement;
        }
        
        return allText;
      }

      function isReadMoreLink(text) {
        var t = (text || '').trim().toLowerCase();
        return (
          t === 'read more' ||
          t === 'read more →' ||
          t === 'read more→' ||
          t === 'read article' ||
          t === 'read article →' ||
          t === 'read article→' ||
          t.indexOf('read more') === 0 ||
          t.indexOf('read article') === 0
        );
      }

      function isLearnMoreLink(text) {
        var t = (text || '').trim().toLowerCase();
        return (
          t === 'learn more' ||
          t === 'learn more →' ||
          t === 'learn more→' ||
          t.indexOf('learn more') === 0
        );
      }

      document.addEventListener('click', function (e) {
        var target = e.target;
        var anchor = null;
        var node = target;
        
        for (var i = 0; i < 8; i++) {
          if (!node || node === document.body) break;
          if (node.tagName === 'A') { anchor = node; break; }
          if (node.tagName === 'BUTTON') { anchor = node; break; }
          node = node.parentElement;
        }
        if (!anchor) return;

        var linkText = (anchor.textContent || anchor.innerText || '').trim();
        
        var isBlogLink = isReadMoreLink(linkText);
        var isServiceLink = isLearnMoreLink(linkText);
        
        if (!isBlogLink && !isServiceLink) return;

        var cardText = getCardText(anchor);
        var url = null;

        if (isBlogLink) {
          url = matchRoute(cardText, blogRoutes);
        } else if (isServiceLink) {
          url = matchRoute(cardText, serviceRoutes);
        }

        if (url) {
          e.preventDefault();
          e.stopImmediatePropagation();
          window.location.href = url;
        }
      }, true);

    })();
    </script>
