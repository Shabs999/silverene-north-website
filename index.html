    <script>
    // ============================================================
    // BLOG ARTICLE INTERCEPTOR
    // Uses capture phase (fires BEFORE React Router) to redirect
    // "Read More" / "Read Article" clicks to static HTML pages.
    // ============================================================
    (function () {
      var routes = [
        { words: ['ai search visibility', 'what is ai search'], url: '/ai-search-visibility.html' },
        { words: ['chatgpt', 'competitors'], url: '/chatgpt-recommends-competitors.html' },
        { words: ['ai guilt', '5 signs'], url: '/ai-guilt.html' },
        { words: ['google ai overviews', 'ai overviews'], url: '/google-ai-overviews.html' }
      ];

      function matchRoute(text) {
        var t = text.toLowerCase();
        for (var i = 0; i < routes.length; i++) {
          for (var j = 0; j < routes[i].words.length; j++) {
            if (t.indexOf(routes[i].words[j]) !== -1) return routes[i].url;
          }
        }
        return null;
      }

      // Walk up the DOM from the clicked element to find a blog card heading
      function getCardText(el) {
        var node = el;
        for (var depth = 0; depth < 10; depth++) {
          if (!node || node === document.body) break;
          // Look for any heading or strong text inside this container
          var headings = node.querySelectorAll('h1,h2,h3,h4,h5,h6');
          for (var k = 0; k < headings.length; k++) {
            var txt = (headings[k].textContent || '').trim();
            if (txt.length > 8) return txt;
          }
          node = node.parentElement;
        }
        return '';
      }

      // CAPTURE PHASE — fires before React's synthetic event system
      document.addEventListener('click', function (e) {
        var target = e.target;

        // Walk up to find the anchor tag
        var anchor = null;
        var node = target;
        for (var i = 0; i < 5; i++) {
          if (!node || node === document.body) break;
          if (node.tagName === 'A') { anchor = node; break; }
          node = node.parentElement;
        }
        if (!anchor) return;

        var linkText = (anchor.textContent || anchor.innerText || '').trim().toLowerCase();
        var isReadLink = (
          linkText === 'read more' ||
          linkText === 'read more \u2192' ||
          linkText === 'read article' ||
          linkText === 'read article \u2192' ||
          linkText === '\u2190 read article'
        );
        if (!isReadLink) return;

        var cardText = getCardText(anchor);
        var url = matchRoute(cardText);

        if (url) {
          e.preventDefault();
          e.stopImmediatePropagation(); // blocks React Router entirely
          window.location.href = url;
        }
      }, true); // <-- true = capture phase, fires BEFORE React

    })();
    </script>
