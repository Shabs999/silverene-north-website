<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Silverene North Corp</title>
    <script>
      // SPA redirect for React Router — but ONLY for paths without a file extension
      // Paths like /ai-search-visibility.html should be served directly by GitHub Pages
      var path = window.location.pathname;
      var hasExtension = path.match(/\.[a-zA-Z0-9]+$/);
      if (!hasExtension && path !== '/') {
        // Encode the path into a query param and redirect to root
        sessionStorage.setItem('redirect', path + window.location.search);
        window.location.replace('/' + window.location.hash);
      }
    </script>
  </head>
  <body></body>
</html>
